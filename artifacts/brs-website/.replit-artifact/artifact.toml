kind = "web"
previewPath = "/"
title = "Body Reshaping Studio"
version = "1.0.0"
id = "artifacts/brs-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20308

[services.development]
run = "pnpm --filter @workspace/brs-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/brs-website", "run", "build" ]
publicDir = "artifacts/brs-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20308"
BASE_PATH = "/"
